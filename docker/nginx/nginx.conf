worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    include       /etc/nginx/cloudflare-ips.conf;

    proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls:64m max_size=4g inactive=30m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api:32m max_size=256m inactive=10m use_temp_path=off;
    limit_req_zone $binary_remote_addr zone=api_rl:20m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=hls_rl:20m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=addr:20m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_cf_connecting_ip" "$upstream_cache_status"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/vnd.apple.mpegurl application/dash+xml;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    upstream backend {
        server backend:8080;
        keepalive 64;
    }

    upstream hls_proxy {
        server hls_proxy:8089;
        keepalive 16;
    }

    upstream rtmp {
        server rtmp:80;
        keepalive 16;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location ~ ^/live/.+\.m3u8$ {
            rewrite ^/live/(.*)$ /hls/$1 break;
            proxy_pass http://rtmp;
            proxy_cache hls;
            proxy_cache_valid 200 1s;
            proxy_cache_lock on;
            proxy_read_timeout 30s;
            add_header Cache-Control "public, max-age=1, s-maxage=1" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~ ^/live/.+\.ts$ {
            rewrite ^/live/(.*)$ /hls/$1 break;
            proxy_pass http://rtmp;
            proxy_cache hls;
            proxy_cache_valid 200 60s;
            proxy_cache_lock on;
            proxy_read_timeout 30s;
            limit_req zone=hls_rl burst=50 nodelay;
            limit_conn addr 50;
            add_header Cache-Control "public, max-age=60, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /api/ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/ {
            limit_req zone=api_rl burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_cache api;
            proxy_cache_methods GET HEAD;
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;
            proxy_cache_valid 200 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /hls/ {
            proxy_pass http://hls_proxy/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 86400;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /proxy {
            proxy_pass http://hls_proxy;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 86400;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /channel/ {
            proxy_pass http://hls_proxy;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 86400;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        location ~* \.(js|css|png|svg|ico|woff2|woff)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /hls-fixtures/ {
            alias /etc/nginx/hls-fixtures/;
            default_type text/html;
            add_header Cache-Control "no-store";
        }
    }
}
