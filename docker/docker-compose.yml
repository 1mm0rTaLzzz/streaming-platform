version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
      POSTGRES_DB: streamdb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../backend/migrations/001_initial.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../backend/migrations/002_mirrors_priority.sql:/docker-entrypoint-initdb.d/02_schema_ext.sql:ro
      - ../scripts/seed-teams.sql:/docker-entrypoint-initdb.d/03_teams.sql:ro
      - ../scripts/seed-admin.sql:/docker-entrypoint-initdb.d/04_admin.sql:ro
      - ../scripts/seed-schedule.sql:/docker-entrypoint-initdb.d/05_schedule.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d streamdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://stream:stream@postgres:5432/streamdb?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123}
      ENV: ${ENV:-production}
      STREAMER_URL: http://streamer:8090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      streamer:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  streamer:
    build:
      context: ./streamer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RTMP_BASE: rtmp://rtmp:1935/live
    volumes:
      - chromium_profile:/profile
    shm_size: 1gb
    depends_on:
      - rtmp

  rtmp:
    image: alfg/nginx-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"   # OBS pushes here: rtmp://server:1935/live
      - "8088:80"     # internal HLS HTTP (proxied by nginx at /live/)
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - hls_data:/tmp/hls

  hls_proxy:
    image: ghcr.io/pcruz1905/hls-restream-proxy:latest
    restart: unless-stopped
    volumes:
      - ./hls/channels.conf:/app/channels.conf:ro
    ports:
      - "8089:8089"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ./hls/fixtures:/etc/nginx/hls-fixtures:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - hls_proxy
      - rtmp

volumes:
  pg_data:
  redis_data:
  frontend_dist:
  hls_data:
  chromium_profile:
