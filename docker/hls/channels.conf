# Format (pipe-separated, 6th field is used as source page URL):
# slug|channel_name|number|logo|group|source_page_url
#
# NOTE:
# /channel/<slug> in this proxy tries to scrape an iframe page and then find m3u8 inside it.
# If your source is already a direct m3u8 URL, use /proxy?url=<encoded_m3u8> instead.
#
# Local demo channel for smoke tests in this compose network:
# source_url points to a local page with iframe -> embed page -> m3u8 URL.
demo|Demo Local|1|https://example.com/logo.png|Demo|http://nginx/hls-fixtures/source.html

# Example for real usage (replace with your source page):
# sport1|Sport 1|1|https://example.com/logo.png|Sports|https://example.com/watch/sport1
